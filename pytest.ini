[pytest]
# ── Test Discovery ────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Environment ───────────────────────────────
env_files = .env.test

# ── Output ────────────────────────────────────
addopts = 
    -v
    --tb=short
    --no-header
    -p no:warnings
    --strict-markers

# ── Markers ───────────────────────────────────
markers =
    unit: Unit tests (no database required)
    integration: Integration tests (requires database)
    auth: Authentication related tests
    users: User management tests
    events: Event management tests
    bookings: Booking management tests
    categories: Category management tests
    waitlist: Waitlist management tests
    notifications: Notification tests
    invoices: Invoice tests
    admin: Admin dashboard tests
    audit: Audit log tests
    slow: Tests that take longer to run

# ── Asyncio ───────────────────────────────────
asyncio_mode = auto