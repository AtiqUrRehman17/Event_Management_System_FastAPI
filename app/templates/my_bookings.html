{% extends "base.html" %}

{% block title %}My Bookings - EventHub{% endblock %}

{% block content %}
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="fas fa-ticket-alt me-2"></i>My Bookings</h2>
        <a href="/events" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>Book New Event
        </a>
    </div>

    <!-- Summary Cards -->
    <div class="row g-3 mb-4" id="summaryCards">
        <div class="col-md-3 col-6">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <i class="fas fa-ticket-alt fa-lg text-primary mb-2"></i>
                    <h4 class="fw-bold" id="totalBookings">0</h4>
                    <small class="text-muted">Total Bookings</small>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <i class="fas fa-check-circle fa-lg text-success mb-2"></i>
                    <h4 class="fw-bold" id="activeBookings">0</h4>
                    <small class="text-muted">Active</small>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <i class="fas fa-times-circle fa-lg text-danger mb-2"></i>
                    <h4 class="fw-bold" id="cancelledBookings">0</h4>
                    <small class="text-muted">Cancelled</small>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <i class="fas fa-dollar-sign fa-lg text-warning mb-2"></i>
                    <h4 class="fw-bold" id="totalSpent">$0</h4>
                    <small class="text-muted">Total Spent</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Tabs -->
    <ul class="nav nav-pills mb-4" id="bookingTabs">
        <li class="nav-item">
            <a class="nav-link active" href="#" onclick="filterBookings(null, this)">All</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#" onclick="filterBookings('active', this)">Active</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#" onclick="filterBookings('cancelled', this)">Cancelled</a>
        </li>
    </ul>

    <!-- Bookings List -->
    <div id="bookingsContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="text-muted mt-2">Loading bookings...</p>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentFilter = null;

    document.addEventListener('DOMContentLoaded', function() {
        if (!getToken()) {
            window.location.href = '/login';
            return;
        }
        loadBookings();
        loadSummary();
    });

    async function loadSummary() {
        try {
            const response = await apiCall('/api/v1/bookings/me/summary');
            if (response.success) {
                document.getElementById('totalBookings').textContent = response.data.total_bookings || 0;
                document.getElementById('activeBookings').textContent = response.data.active_bookings || 0;
                document.getElementById('cancelledBookings').textContent = response.data.cancelled_bookings || 0;
                document.getElementById('totalSpent').textContent = `$${(response.data.total_spent || 0).toFixed(2)}`;
            }
        } catch (e) {
            console.error('Failed to load summary:', e);
        }
    }

    async function loadBookings() {
        const container = document.getElementById('bookingsContainer');
        container.innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Loading bookings...</p>
            </div>`;

        let url = '/api/v1/bookings/me?limit=50';
        if (currentFilter) url += `&status=${currentFilter}`;

        try {
            const response = await apiCall(url);
            if (response.success) {
                renderBookings(response.data.bookings || []);
            } else {
                container.innerHTML = '<p class="text-muted text-center">Failed to load bookings</p>';
            }
        } catch (e) {
            container.innerHTML = '<p class="text-muted text-center">Error loading bookings</p>';
        }
    }

    function renderBookings(bookings) {
        const container = document.getElementById('bookingsContainer');

        if (!bookings || bookings.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5">
                    <i class="fas fa-ticket-alt fa-4x text-muted mb-3"></i>
                    <h4 class="text-muted">No Bookings Found</h4>
                    <p class="text-muted">Start by browsing and booking events!</p>
                    <a href="/events" class="btn btn-primary"><i class="fas fa-calendar me-1"></i>Browse Events</a>
                </div>`;
            return;
        }

        container.innerHTML = bookings.map(booking => `
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <h5 class="fw-bold mb-1">
                                <a href="/events/${booking.event_id}" class="text-decoration-none text-dark">
                                    ${booking.event_title || 'Event #' + booking.event_id}
                                </a>
                            </h5>
                            <div class="mb-1">
                                <small class="text-muted">
                                    <i class="fas fa-clock me-1"></i>${formatDate(booking.event_date || booking.booking_date)}
                                </small>
                            </div>
                            <div>
                                <small class="text-muted">
                                    <i class="fas fa-map-marker-alt me-1"></i>${booking.event_location || 'N/A'}
                                </small>
                            </div>
                        </div>
                        <div class="col-md-3 text-center">
                            <div class="mb-1">
                                <span class="badge ${booking.status === 'active' ? 'bg-success' : 'bg-danger'} fs-6">
                                    ${booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}
                                </span>
                            </div>
                            <small class="text-muted">${booking.number_of_seats} seat(s)</small>
                            <div class="fw-bold text-primary">$${booking.total_price.toFixed(2)}</div>
                        </div>
                        <div class="col-md-3 text-end">
                            ${booking.status === 'active' ? `
                                <button class="btn btn-outline-danger btn-sm" onclick="cancelBooking(${booking.id})">
                                    <i class="fas fa-times me-1"></i>Cancel
                                </button>
                            ` : `
                                <small class="text-muted">
                                    Cancelled on<br>${booking.cancelled_at ? formatDate(booking.cancelled_at) : 'N/A'}
                                </small>
                            `}
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function filterBookings(status, element) {
        currentFilter = status;
        document.querySelectorAll('#bookingTabs .nav-link').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        loadBookings();
    }

    async function cancelBooking(bookingId) {
        if (!confirm('Are you sure you want to cancel this booking?')) return;

        try {
            const response = await apiCall(`/api/v1/bookings/${bookingId}/cancel`, {
                method: 'POST'
            });

            if (response.success) {
                showAlert('Booking cancelled successfully.', 'success');
                loadBookings();
                loadSummary();
            } else {
                showAlert(response.message || 'Failed to cancel booking.', 'danger');
            }
        } catch (e) {
            showAlert('Error cancelling booking.', 'danger');
        }
    }
</script>
{% endblock %}
